name: Build iOS IPA (Standalone)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 📥 擷取專案代碼 (Checkout)
        uses: actions/checkout@v4

      - name: 📦 安裝 Web 依賴項 (Node.js)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🛠️ 通訊建構協議 (Install & Build)
        run: |
          # 解決 Tailwind 4 零件衝突
          rm -f package-lock.json
          npm install
          npm run build

      - name: 🧬 注入 iOS 原生基因 (Capacitor Sync)
        run: |
          npx cap sync ios

      - name: 🏗️ 啟動 Xcode 雲端編譯 (Build App)
        run: |
          set -o pipefail
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: 📦 打包成 .ipa 檔 (Windows 專用)
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Debug-iphoneos/App.app Payload/
          zip -r KitchenAI.ipa Payload
          
      - name: 📁 上傳安裝資源 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: KitchenAI-iOS-Standalone-IPA
          path: KitchenAI.ipa
